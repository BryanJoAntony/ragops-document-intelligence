services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragops-api
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./storage:/app/storage
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/tests:/app/tests
    depends_on:
      - postgres
      - redis
      - qdrant
    environment:
      SERVICE_NAME: ragops-api
      LOG_DIR: /app/logs
      FILE_STORAGE_BACKEND: local
      STORAGE_DIR: /app/storage
      UPLOAD_DIR: /app/storage/uploads
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QDRANT_HOST: qdrant
      QDRANT_COLLECTION_NAME: ragops_chunks
      EMBEDDING_PROVIDER: sentence_transformers
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: 384
      RETRIEVAL_TOP_K: 5
      ANSWER_PROVIDER: local_extractive
      ANSWER_MODEL: local_extractive_v1
      MAX_CONTEXT_CHUNKS: 5

  postgres:
    image: postgres:16-alpine
    container_name: ragops-postgres
    environment:
      POSTGRES_USER: ragops_user
      POSTGRES_PASSWORD: ragops_password
      POSTGRES_DB: ragops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ragops-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: